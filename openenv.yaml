spec_version: 1
name: disaster-response-env
version: "1.0.0"
type: space
runtime: fastapi
app: inference:app
port: 7860

tasks:
  - id: task_easy
    difficulty: easy
    grader: /grade/task_easy
  - id: task_medium
    difficulty: medium
    grader: /grade/task_medium
  - id: task_hard
    difficulty: hard
    grader: /grade/task_hard

observation_space:
  regions: "list of regions with name, severity, population, helped"
  ambulances: "int — remaining ambulances"
  reward: "float — step reward"
  done: "bool — episode complete"
  score: "float — current grader score (0.0-1.0)"

action_space:
  action_type: "string — allocate"
  region_name: "string — region to allocate ambulance to (A, B, or C)"

reward:
  type: continuous
  range: [-1.0, 2.0]

endpoints:
  - path: /reset
    method: POST
  - path: /step
    method: POST
  - path: /state
    method: GET
  - path: /grade/task_easy
    method: POST
  - path: /grade/task_medium
    method: POST
  - path: /grade/task_hard
    method: POST
  - path: /grader
    method: POST
  - path: /health
    method: GET