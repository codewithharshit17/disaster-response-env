name: disaster_response_env
version: "0.1.0"
description: Disaster response planning environment for OpenEnv hackathon

environment:
  entrypoint: server.app:app

tasks:
  easy:
    description: Allocate ambulance to highest severity region
    grader: deterministic
    score_range: [0.0, 1.0]
  medium:
    description: Handle multiple regions efficiently
    grader: deterministic
    score_range: [0.0, 1.0]
  hard:
    description: Optimize full disaster response
    grader: deterministic
    score_range: [0.0, 1.0]